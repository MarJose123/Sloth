name: Android Dev Client Build

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'app.json'
      - 'bun.lock'
      - '.github/workflows/dev-build-android.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK + CMake
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'bun.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Expo prebuild (Android only)
        run: bunx expo prebuild --platform android --clean

      - name: Install fixed debug keystore
        run: cp keystores/debug.keystore android/app/debug.keystore

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK with run number
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            dist/sloth-dev-${{ github.run_number }}.apk

      - name: Create/update dev-build release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-build-latest
          name: Sloth dev client (build ${{ github.run_number }})
          prerelease: true
          files: dist/*.apk
          body: |
            Auto-built dev client APK — commit ${{ github.sha }}.
            Not for distribution outside the dev team; debug-signed only.
