name: Android Dev Client Build

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'app.json'
      - 'bun.lock'
      - '.github/workflows/dev-build-android.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v6.1.0
        with:
          path: /usr/local/lib/android/sdk/ndk/27.1.12297006
          key: ${{ runner.os }}-ndk-27.1.12297006

      - name: Cache CMake
        id: cache-cmake
        uses: actions/cache@v6.1.0
        with:
          path: /usr/local/lib/android/sdk/cmake/3.22.1
          key: ${{ runner.os }}-cmake-3.22.1

      - name: Install Android NDK + CMake
        if: steps.cache-ndk.outputs.cache-hit != 'true' || steps.cache-cmake.outputs.cache-hit != 'true'
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'bun.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Expo prebuild (Android only)
        run: bunx expo prebuild --platform android --clean

      - name: Install fixed debug keystore
        run: cp keystores/debug.keystore android/app/debug.keystore

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK with run number
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            dist/sloth-dev-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sloth-debug-apk
          path: dist/*.apk
