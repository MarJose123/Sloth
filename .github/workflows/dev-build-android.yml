name: Android Standalone Build

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'app.json'
      - 'bun.lock'
      - '.github/workflows/dev-build-android.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'bun.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Standalone APK
        run: |
          mkdir -p dist
          bunx eas build --platform android --profile preview --local --non-interactive --output=dist/sloth-dev-${{ github.run_number }}.apk
        env:
          EAS_NO_VCS: 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sloth-standalone-apk
          path: dist/*.apk
