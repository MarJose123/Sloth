name: Android Debug Build

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'app.json'
      - 'bun.lock'
      - '.github/workflows/dev-build-android.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'bun.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Standalone APKs
        run: |
          bunx expo prebuild --platform android --clean
          cp keystores/debug.keystore android/app/debug.keystore 
          
          cd android
          
          # Build debug APK
          ./gradlew assembleDebug --no-daemon
          
          # Build release APK (signed with debug keystore for internal testing)
          ./gradlew assembleRelease --no-daemon
          
          cd ..
          mkdir -p dist
          
          # Extract version info for naming
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_DATE=$(date +%Y%m%d)
          
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            dist/sloth-debug-v${VERSION}-build${{ github.run_number }}-${BUILD_DATE}-${SHORT_SHA}.apk
          cp android/app/build/outputs/apk/release/app-release.apk \
            dist/sloth-release-v${VERSION}-build${{ github.run_number }}-${BUILD_DATE}-${SHORT_SHA}.apk
        env:
          EAS_NO_VCS: 1

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sloth-apks
          path: dist/*.apk
