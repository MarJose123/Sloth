name: Android Debug Build

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'app.json'
      - 'bun.lock'
      - '.github/workflows/dev-build-android.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache NDK + CMake
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
            ${{ env.ANDROID_HOME }}/cmake/3.22.1
          key: android-ndk-27.1.12297006-cmake-3.22.1

      - name: Install Android NDK + CMake
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'bun.lock') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build standalone-testable APK
        run: |
          bunx expo prebuild --platform android --clean
          cp keystores/debug.keystore android/app/debug.keystore

          cd android

          # Single ABI (arm64-v8a covers virtually all physical test devices sold since ~2017)
          # and a single variant: release-type build is the one that embeds the JS bundle
          # and actually runs without Metro attached. Plain `assembleDebug` expects a live
          # Metro server and is not useful to hand to an external tester.
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon --parallel --build-cache

          cd ..
          mkdir -p dist

          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BUILD_DATE=$(date +%Y%m%d)

          cp android/app/build/outputs/apk/release/app-release.apk \
            dist/sloth-v${VERSION}-build${{ github.run_number }}-${BUILD_DATE}-${SHORT_SHA}-arm64.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sloth-apk
          path: dist/*.apk
